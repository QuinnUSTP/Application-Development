<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <style>
        .dev-banner {
            background: #fff4d6;
            border: 1px solid #f3d18a;
            color: #6a4b00;
            padding: 10px 12px;
            margin: 12px auto;
            max-width: 1080px;
            border-radius: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="dev-banner"><strong>Dev-only page:</strong> This page is for local API testing and isn’t part of the storefront UI.</div>
    <h1>Backend API Test</h1>
    <div id="results"></div>

    <script>
        async function testAPI() {
            const results = document.getElementById('results');
            
            try {
                // Test health
                results.innerHTML += '<p><strong>Testing Health...</strong></p>';
                let response = await fetch('http://localhost:5000/api/health');
                let data = await response.json();
                results.innerHTML += '<p>✅ Health: ' + JSON.stringify(data) + '</p>';
                
                // Test products
                results.innerHTML += '<p><strong>Testing Products...</strong></p>';
                response = await fetch('http://localhost:5000/api/products');
                data = await response.json();
                results.innerHTML += '<p>✅ Products Response Structure:</p>';
                results.innerHTML += '<pre>' + JSON.stringify(data, null, 2).substring(0, 500) + '...</pre>';
                
                if (data.data && data.data.length > 0) {
                    results.innerHTML += '<p>✅ First Product: ' + JSON.stringify(data.data[0]) + '</p>';
                } else {
                    results.innerHTML += '<p>❌ No products in data</p>';
                }
                
            } catch (error) {
                results.innerHTML += '<p>❌ Error: ' + error.message + '</p>';
            }
        }
        
        testAPI();
    </script>
</body>
</html>
