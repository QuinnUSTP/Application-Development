<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Schema Viewer - RedStore</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #f7f8fa; }
    .schema-wrap { max-width: 1200px; margin: 20px auto 40px; padding: 0 16px; }
    .schema-card { background: #fff; border-radius: 10px; box-shadow: 0 0 18px rgba(0,0,0,.08); padding: 16px; margin-bottom: 16px; }
    .schema-top { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .schema-meta { color: #555; font-size: 14px; }
    .chip { display:inline-block; border-radius:999px; padding:2px 8px; font-size:12px; margin-right:6px; }
    .chip.pk { background:#ffe7c2; color:#8a4b00; }
    .chip.fk { background:#d9ecff; color:#034078; }
    .chip.req { background:#ffd9d9; color:#7a1010; }
    .chip.unique { background:#dcf7e4; color:#0c5f2a; }
    .schema-table { width:100%; border-collapse: collapse; margin-top: 10px; }
    .schema-table th, .schema-table td { border-bottom: 1px solid #eee; text-align:left; padding:8px; vertical-align: top; font-size: 13px; }
    .schema-table th { background: #fafafa; }
    .small-muted { color:#777; font-size: 12px; }
    .danger { color: #9b1c1c; }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div class="logo"><a href="index.html"><img src="images/logo.png" width="125px" alt="RedStore"></a></div>
      <nav>
        <ul id="MenuItems">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="index.html#footer">Contact</a></li>
          <li id="account-nav-item"><a href="account.html">Account</a></li>
        </ul>
      </nav>
      <a href="cart.html">
        <img src="images/cart.png" width="30px" height="30px" alt="Cart" />
        <span id="cart-count" class="cart-count">0</span>
      </a>
      <img src="images/menu.png" class="menu-icon" onclick="UIUtils.toggleMenu()" alt="Menu" />
    </div>
  </div>

  <div class="schema-wrap">
    <div class="schema-card">
      <div class="schema-top">
        <h2 style="margin:0;">Database Schema Viewer</h2>
        <div>
          <button id="refreshBtn" class="btn" style="padding:6px 16px;">Refresh</button>
        </div>
      </div>
      <p class="schema-meta">
        Shows <strong>primary keys</strong>, <strong>foreign keys</strong>, <strong>attributes</strong>, <strong>indexes</strong>, and <strong>relationships</strong> from Mongoose models.
      </p>
      <div id="statusText" class="small-muted">Loading…</div>
    </div>

    <div id="relationshipsRoot" class="schema-card"></div>
    <div id="entitiesRoot"></div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/db-schema-viewer.js"></script>
</body>
</html>
