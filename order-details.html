<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details - RedStore</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
  <div class="container">
    <div class="navbar">
      <div class="logo">
        <a href="index.html"><img src="images/logo.png" width="125px" alt="RedStore"></a>
      </div>
      <nav>
        <ul id="MenuItems">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="index.html#footer">Contact</a></li>
          <li id="account-nav-item"><a href="account.html">Account</a></li>
        </ul>
      </nav>
      <a href="cart.html">
        <img src="images/cart.png" width="30px" height="30px" alt="Cart">
        <span id="cart-count" class="cart-count">0</span>
      </a>
      <img src="images/menu.png" class="menu-icon" onclick="UIUtils.toggleMenu()" alt="Menu">
    </div>
  </div>

  <div class="small-container" style="margin-top: 30px; margin-bottom: 60px;">
    <div id="orderDetailsRoot" class="order-details-root">
      <div class="empty-state">Loading order details...</div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui-utils.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/order-details.js"></script>
</body>

</html>
